
services:
  fast-api-app:
    build:
      dockerfile: ./backend/Dockerfile-backend
    ports:
      - "${UVICORN_PORT}:${UVICORN_PORT}"
    networks:
      - existing-network
    env_file:
      - .env
    environment:
      UVICORN_PORT: "${UVICORN_PORT}"

  react-app:
    build:
      dockerfile: ./frontend/Dockerfile-frontend
      args:
        VITE_REACT_API_URL: "${VITE_REACT_API_URL}"
    ports:
      - "${REACT_PORT}:80"
    networks:
      - existing-network
    env_file:
      - .env

  ollama-instance:
    image: ollama/ollama
    networks:
      - existing-network
    profiles:
      - ollama
    volumes:
      - ollama-data:/root/.ollama


volumes:
  ollama-data:


networks:
  existing-network:
    external: True
    name: ollama-network
