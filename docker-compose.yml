
services:
  fast-api-app:
    build:
      dockerfile: ./backend/Dockerfile-backend
    ports:
      - "${UVICORN_PORT}:${UVICORN_PORT}"
    networks:
      - existing-network
    env_file:
      - .env
    environment:
      UVICORN_PORT: "${UVICORN_PORT}"

  streamlit-front-app:
    build:
      dockerfile: ./frontend/Dockerfile-frontend
    ports:
      - "${STREAMLIT_PORT}:${STREAMLIT_PORT}"
    networks:
      - existing-network
    env_file:
      - .env
    environment:
      STREAMLIT_PORT: "${STREAMLIT_PORT}"

  ollama-instance:
    image: ollama/ollama
    networks:
      - existing-network
    profiles:
      - ollama
    volumes:
      - ollama-data:/root/.ollama


volumes:
  ollama-data:


networks:
  existing-network:
    external: True
    name: ollama-network
